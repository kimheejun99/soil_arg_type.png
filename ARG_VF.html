    function initMap() {
      const center = { lat: 71.2, lng: -156.4 };
      const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: center,
      });

      const oms = new OverlappingMarkerSpiderfier(map, {
        markersWontMove: true,
        markersWontHide: true,
        basicFormatEvents: true,
        keepSpiderfied: true
      });

      const infoWindow = new google.maps.InfoWindow();

      // GitHub Raw 이미지 주소를 고정으로 사용합니다 (가장 확실한 방법)
      const rawBase = "https://raw.githubusercontent.com/kimheejun99/soil_arg_type.png/main";

      const markers = data.map(loc => {
        const marker = new google.maps.Marker({
          position: { lat: loc.lat, lng: loc.lng },
          title: loc.id,
        });

        // 주소를 조합합니다.
        const argsImg = `${rawBase}/ARG_barplot/${loc.id}_tpm.png`;
        const vfImg = `${rawBase}/VF_barplot/${loc.id}_vf_category.png`;

        marker.desc = `
          <div style="text-align:center; min-width: 250px;">
            <strong style="font-size:14px;">Sample ID: ${loc.id}</strong><hr>
            <div style="margin-bottom:10px;">
              <p style="margin:5px 0; font-weight:bold;">ARG TPM Barplot</p>
              <img src="${argsImg}" width="300" style="cursor:zoom-in; border:1px solid #ddd;" 
                   onclick="showModal('${argsImg}')" 
                   onerror="this.onerror=null;this.src='https://via.placeholder.com/300x150?text=ARG+Image+Not+Found';">
            </div>
            <div>
              <p style="margin:5px 0; font-weight:bold;">VF Category Barplot</p>
              <img src="${vfImg}" width="300" style="cursor:zoom-in; border:1px solid #ddd;" 
                   onclick="showModal('${vfImg}')" 
                   onerror="this.onerror=null;this.src='https://via.placeholder.com/300x150?text=VF+Image+Not+Found';">
            </div>
          </div>
        `;

        oms.addMarker(marker);
        return marker;
      });

      oms.addListener('click', function(marker) {
        infoWindow.setContent(marker.desc);
        infoWindow.open(map, marker);
      });

      new markerClusterer.MarkerClusterer({ map, markers });
    }

    function showModal(src) {
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");
      modalImg.src = src;
      modal.style.display = "block";
    }

    window.onclick = function(event) {
      const modal = document.getElementById("imageModal");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    }
